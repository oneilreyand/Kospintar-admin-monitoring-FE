<svg width="29" height="45" viewBox="0 0 29 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes sheen {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      30% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
        opacity: 0;
      }
      100% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
        opacity: 0;
      }
    }
    .sheen-layer {
      animation: sheen 4s infinite ease-out; /* Mengatur kecepatan dan pengulangan */
      fill: rgba(255, 255, 255, 0.4); /* Warna kilau putih transparan */
    }
  </style>

